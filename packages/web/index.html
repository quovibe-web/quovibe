<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quovibe</title>
    <link rel="icon" type="image/svg+xml" href="/assets/logo/logo-icon-spark.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@300;700;800&family=Outfit:wght@200&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      (function(){var o=localStorage.getItem('vibefolio-theme');if(o&&!localStorage.getItem('quovibe-theme')){localStorage.setItem('quovibe-theme',o);localStorage.removeItem('vibefolio-theme');}var t=localStorage.getItem('quovibe-theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
