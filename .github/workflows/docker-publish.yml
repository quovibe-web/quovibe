name: Docker Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pre-publish gates: the tag may be cut from any commit, so the
      # branch-protected CI on push/PR is not a sufficient guarantee.
      # Re-run the load-bearing gates against the exact tagged tree before
      # building the image that ships to GHCR.
      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (ppxml2db)
        run: pip install -r packages/api/vendor/requirements.txt

      - name: Install dependencies
        run: pnpm install

      - name: Build (typecheck)
        run: pnpm build

      - name: Lint (engine, zero-tolerance)
        run: pnpm lint:engine

      - name: Governance checks
        run: pnpm check:governance

      - name: Architecture checks
        run: pnpm check:arch

      - name: Bootstrap parity (Gate 1 — bootstrap.sql vs ppxml2db_init.py)
        run: pnpm check:bootstrap

      - name: Tests
        run: pnpm test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/quovibe-web/quovibe
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}

      # Compose the release body. If docs/release-notes/<tag>.md exists,
      # use it; otherwise fall back to the matching <major.minor>.0.md
      # (so patch releases inherit the parent minor's notes). Final fallback
      # is the minimal image-coordinates blurb.
      - name: Compose release body
        id: release_body
        run: |
          TAG="${{ github.ref_name }}"
          MM=$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+).*/v\1.0/')
          for cand in "docs/release-notes/${TAG}.md" "docs/release-notes/${MM}.md"; do
            if [ -f "$cand" ]; then
              echo "Using $cand"
              cp "$cand" RELEASE_BODY.md
              break
            fi
          done
          if [ ! -f RELEASE_BODY.md ]; then
            printf "Quovibe %s\n\nDocker image: \`ghcr.io/quovibe-web/quovibe:%s\`\n" "$TAG" "$TAG" > RELEASE_BODY.md
          fi
          {
            echo
            echo "---"
            echo
            echo "**Docker image:** \`ghcr.io/quovibe-web/quovibe:${TAG}\` · \`ghcr.io/quovibe-web/quovibe:latest\`"
          } >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: false
