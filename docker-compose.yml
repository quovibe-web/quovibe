services:
  quovibe:
    image: ghcr.io/quovibe-web/quovibe:latest
    container_name: quovibe
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - quovibe_data:/app/data
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/portfolios"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  quovibe_data:
