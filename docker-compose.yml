services:
  quovibe:
    image: ghcr.io/quovibe-web/quovibe:latest
    container_name: quovibe
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - quovibe_data:/app/data
    environment:
      - NODE_ENV=production
      # Optional overrides (defaults documented in docs/architecture/operations.md):
      # - LOG_LEVEL=info
      # - DB_BACKUP_MAX=10
      # - PRICE_FETCH_INTERVAL_MS=900000
    restart: unless-stopped
    stop_grace_period: 15s
    # Healthcheck is declared in the Dockerfile (HEALTHCHECK instruction) so it
    # also applies to bare `docker run`. Override here only if intentionally
    # diverging from the image-level definition.
    mem_limit: 512m
    cpus: 1.0

volumes:
  quovibe_data:
